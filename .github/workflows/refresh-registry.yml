name: Refresh plan registry

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/build-registry.mjs
      # Staking reads the consensus RPC via polkadot.js; if it hiccups, don't block the
      # registry refresh - the previous data/staking.js stays in place.
      - run: node scripts/build-staking.mjs
        continue-on-error: true
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/registry.json data/registry.js data/staking.json data/staking.js
          git diff --cached --quiet || git commit -m "Refresh plan registry and staking data"
          git push
